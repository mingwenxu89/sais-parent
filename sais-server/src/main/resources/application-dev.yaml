server:
  port: 48080

--- #################### Database Configuration ####################

spring:
  autoconfigure:
    # noinspection SpringBootApplicationYaml
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure # Exclude Druid auto-config, using dynamic-datasource-spring-boot-starter for multiple datasources
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration # Disable AI Qdrant auto-config, created manually
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration # Disable AI Milvus auto-config, created manually
  datasource:
    druid: # Druid [monitoring] global configuration
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow: # Whitelist; leave empty to allow all
        url-pattern: /druid/*
        login-username: # Console admin username and password
        login-password:
      filter:
        stat:
          enabled: true
          log-slow-sql: true # Slow SQL logging
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic: # Multi-datasource configuration
      druid: # Druid [connection pool] global configuration
        initial-size: 5 # Initial connection count
        min-idle: 10 # Minimum pool size
        max-active: 20 # Maximum pool size
        max-wait: 60000 # Connection acquire timeout, unit: ms (1 min)
        time-between-eviction-runs-millis: 60000 # Idle connection check interval, unit: ms (1 min)
        min-evictable-idle-time-millis: 600000 # Minimum connection lifetime in pool, unit: ms (10 min)
        max-evictable-idle-time-millis: 1800000 # Maximum connection lifetime in pool, unit: ms (30 min)
        validation-query: SELECT 1 FROM DUAL # Connection validation query
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true # Enable PreparedStatement cache
        max-pool-prepared-statement-per-connection-size: 20 # Max cached PreparedStatements per connection
      primary: master
      datasource:
        master:
          url: jdbc:mysql://127.0.0.1:3306/ruoyi-vue-pro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true # MySQL Connector/J 8.X connection example
          username: root
          password: 123456
        slave: # Simulated slave, modify as needed
          lazy: true # Lazy load to improve startup speed
          url: jdbc:mysql://127.0.0.1:3306/ruoyi-vue-pro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true # MySQL Connector/J 8.X connection example
          username: root
          password: 123456

  # Redis configuration. Redisson defaults are sufficient, no tuning needed
  redis:
    host: 400-infra.server.iocoder.cn # Host
    port: 6379 # Port
    database: 1 # Database index
#    password: 123456 # Password, recommended to enable in production

--- #################### Scheduled Tasks Configuration ####################

# Quartz configuration, see QuartzProperties
spring:
  quartz:
    auto-startup: true # Test env, enable Jobs
    scheduler-name: schedulerName # Scheduler name, default: schedulerName
    job-store-type: jdbc # Job store type: memory (default) or jdbc
    wait-for-jobs-to-complete-on-shutdown: true # Wait for jobs to finish on shutdown, recommended: true
    properties: # Quartz Scheduler additional properties, see http://www.quartz-scheduler.org/documentation/2.4.0-SNAPSHOT/configuration.html
      org:
        quartz:
          # Scheduler configuration
          scheduler:
            instanceName: schedulerName
            instanceId: AUTO # Auto-generate instance ID
          # JobStore configuration
          jobStore:
            # JobStore implementation class
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            isClustered: true # Cluster mode
            clusterCheckinInterval: 15000 # Cluster check interval, unit: ms, default: 15000 (15s)
            misfireThreshold: 60000 # Misfire threshold, unit: ms
          # Thread pool configuration
          threadPool:
            threadCount: 25 # Thread pool size, default: 10
            threadPriority: 5 # Thread priority
            class: org.quartz.simpl.SimpleThreadPool # Thread pool class
    jdbc: # JDBC configuration for JDBC JobStore
      initialize-schema: NEVER # Auto-initialize Quartz schema. Set to never, tables created manually

--- #################### Message Queue Configuration ####################

# RocketMQ configuration, see RocketMQProperties
rocketmq:
  name-server: 127.0.0.1:9876 # RocketMQ Namesrv

spring:
  # RabbitMQ configuration, see RabbitProperties
  rabbitmq:
    host: 127.0.0.1 # RabbitMQ host
    port: 5672 # RabbitMQ port
    username: guest # RabbitMQ username
    password: guest # RabbitMQ password
  # Kafka configuration, see KafkaProperties
  kafka:
    bootstrap-servers: 127.0.0.1:9092 # Kafka broker address(es), comma-separated

--- #################### Service Reliability Configuration ####################

# Lock4j configuration
lock4j:
  acquire-timeout: 3000 # Distributed lock acquire timeout, default: 3000 ms
  expire: 30000 # Distributed lock expiry, default: 30000 ms

--- #################### Monitoring Configuration ####################

# Actuator endpoint configuration
management:
  endpoints:
    web:
      base-path: /actuator # Actuator API base path, default: /actuator
      exposure:
        include: '*' # Exposed endpoints. Default: health and info. Use * to expose all

# Spring Boot Admin configuration
spring:
  boot:
    admin:
      # Spring Boot Admin Client configuration
      client:
        url: http://127.0.0.1:${server.port}/${spring.boot.admin.context-path} # Spring Boot Admin Server URL
        instance:
          service-host-type: IP # Instance registration host type [IP, HOST_NAME, CANONICAL_HOST_NAME]
        username: admin
        password: admin
      # Spring Boot Admin Server configuration
      context-path: /admin # Spring Boot Admin Server path

# Logging file configuration
logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log # Log file name with full path

