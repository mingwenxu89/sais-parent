spring:
  application:
    name: sais-server

  profiles:
    active: local

  main:
    allow-circular-references: true # Allow circular references, unavoidable in a three-tier architecture

  # Servlet configuration
  servlet:
    # File upload configuration
    multipart:
      max-file-size: 16MB # Max single file size
      max-request-size: 32MB # Max total upload size

  # Jackson configuration
  jackson:
    serialization:
      write-dates-as-timestamps: true # Use timestamps for Date serialization
      write-date-timestamps-as-nanoseconds: false # Disable nanoseconds format, e.g. 1611460870401 instead of 1611460870.401
      write-durations-as-timestamps: true # Use timestamps for Duration serialization
      fail-on-empty-beans: false # Allow serialization of beans with no properties

  # Cache configuration
  cache:
    type: REDIS
    redis:
      time-to-live: 1h # Cache expiration time: 1 hour

server:
  servlet:
    encoding:
      enabled: true
      charset: UTF-8 # Must set UTF-8 to avoid garbled output in WebFlux streaming (AI scenarios)
      force: true

--- #################### API Documentation Configuration ####################

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
  default-flat-param-object: true # See https://doc.xiaominfo.com/docs/faq/v4/knife4j-parameterobject-flat-param

knife4j:
  enable: true
  setting:
    language: en

# Flowable workflow configuration
flowable:
  # 1. false: default, throws exception if DB version mismatches on startup
  # 2. true: updates all tables on startup, creates if not exist
  # 3. create_drop: creates tables on startup, drops on shutdown
  # 4. drop_create: drops old tables and creates new ones on startup
  database-schema-update: true # Set to false, initialize via https://github.com/flowable/flowable-sql
  db-history-used: true # Flowable 6 default: true, generates history tables automatically
  check-process-definitions: false # Set to false to disable auto-deployment of BPMN XML from /resources/processes
  history-level: audit # full: highest level, saves all process details including node parameters

# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # Default is true, explicitly specified here
  global-config:
    db-config:
      id-type: NONE # "Smart" mode, auto-adapts to AUTO or INPUT based on datasource type via IdTypeEnvironmentPostProcessor
#      id-type: AUTO # Auto-increment ID, suitable for MySQL
#      id-type: INPUT # User-input ID, suitable for Oracle, PostgreSQL, Kingbase, DB2, H2
#      id-type: ASSIGN_ID # Assigned ID using Snowflake. For Oracle/PostgreSQL/Kingbase/DB2/H2, remove @KeySequence from entities
      logic-delete-value: 1 # Logical delete value (default: 1)
      logic-not-delete-value: 0 # Logical not-delete value (default: 0)
    banner: false # Disable banner output
  type-aliases-package: ${yudao.info.base-package}.module.*.dal.dataobject
  encryptor:
    password: XDV71a+xqStEA3WH # Encryption key, generate at https://www.imaegoo.com/2020/aes-key-generator/

mybatis-plus-join:
  banner: false # Print mybatis-plus-join banner, default: true
  sub-table-logic: true # Enable global logical delete on joined tables, default: true
  ms-cache: true # Interceptor MappedStatement cache, default: true
  table-alias: t # Table alias (default: t)
  logic-del-type: on # Position of logical delete condition on joined tables: WHERE or ON, default: ON

# Spring Data Redis configuration
spring:
  data:
    redis:
      repositories:
        enabled: false # Not using Spring Data Redis Repository, disabled to improve startup speed

# VO conversion (data translation) configuration
easy-trans:
  is-enable-global: false # [Disabled by default, high performance impact] Enable global translation (intercepts all SpringMVC ResponseBody). Disable if performance-sensitive, or use @IgnoreTrans to exclude specific endpoints

--- #################### Captcha Configuration ####################

aj:
  captcha:
    jigsaw: classpath:images/jigsaw # Jigsaw captcha background path; uses default if not set; prefix with classpath: for resource dir
    pic-click: classpath:images/pic-click # Click captcha background path; uses default if not set; prefix with classpath: for resource dir
    cache-type: redis # Cache type: local/redis...
    cache-number: 1000 # Local cache threshold, cleared when reached
    timing-clear: 180 # Local cache expiration check interval (seconds), 0 means disabled
    type: blockPuzzle # Captcha type: default (all), blockPuzzle (slider), clickWord (text click), pictureWord (text input)
    water-mark: SAIS # Watermark text (bottom right)
    interference-options: 0 # Slider interference level (0/1/2)
    req-frequency-limit-enable: false # Enable per-minute request rate limiting: true|false
    req-get-lock-limit: 5 # Lock get API after 5 verification failures
    req-get-lock-seconds: 10 # Lock duration after failures (seconds)
    req-get-minute-limit: 30 # Max get API requests per minute
    req-check-minute-limit: 60 # Max check API requests per minute
    req-verify-minute-limit: 60 # Max verify API requests per minute

--- #################### Message Queue Configuration ####################

# RocketMQ configuration, see RocketMQProperties
rocketmq:
  # Producer configuration
  producer:
    group: ${spring.application.name}_PRODUCER # Producer group name

spring:
  # Kafka configuration, see KafkaProperties
  kafka:
    # Kafka Producer configuration
    producer:
      acks: 1 # 0: no ack. 1: leader ack. all: leader and all follower acks
      retries: 3 # Retry count on send failure
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer # Message value serializer
    # Kafka Consumer configuration
    consumer:
      auto-offset-reset: earliest # Set initial consumer offset to earliest. See https://blog.csdn.net/lishuangzhe7047/article/details/74530417
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
    # Kafka Consumer Listener configuration
    listener:
      missing-topics-fatal: false # Prevent error when subscribed topic does not exist

